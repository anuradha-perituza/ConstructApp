name: Build Android APK (Signed Release)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Inject API keys into app.json
        run: |
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            c.expo.extra.anthropicApiKey = process.env.ANTHROPIC_API_KEY || '';
            c.expo.extra.openaiApiKey    = process.env.OPENAI_API_KEY    || '';
            fs.writeFileSync('app.json', JSON.stringify(c, null, 2));
          "
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Generate Android native project
        run: npx expo prebuild --platform android --clean
        env:
          EAS_NO_VCS: 1

      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build signed release APK
        # android.injected.signing.* are AGP injection properties — they override
        # whatever signingConfig is in build.gradle, so this works regardless of
        # what expo prebuild generates. Passwords are passed via env vars so they
        # do not appear as command-line arguments in the process list.
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Verify APK is signed (Android Enterprise requirement)
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          if [ ! -f "$APK" ]; then
            echo "ERROR: Signed APK not found. Check keystore secrets."
            exit 1
          fi
          $JAVA_HOME/bin/keytool -printcert -jarfile "$APK" | grep -E "Owner|Issuer|SHA|Valid"

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/Const.perituza.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: Const.perituza
          path: android/app/build/outputs/apk/release/Const.perituza.apk
          if-no-files-found: error
          retention-days: 30
